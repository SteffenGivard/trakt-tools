[tox]
skipdist = True
envlist = {py39,py310,py311,py312},flake8

[gh-actions]
python =
  3.9: py39
  3.10: py310
  3.11: py311
  3.12: py312

[testenv]
skip_install = True
passenv = *
commands =
  pip install -r tests/requirements.txt
  pip install --editable .
  py.test {posargs} --cov --junit-xml test-results.xml tests

[testenv:flake8]
commands =
  pip install flake8
  flake8 {posargs}

[flake8]
ignore = H301,H302,H306,H802,H803
exclude = .ropeproject,.tox,.venv,build,dist,doc,examples,pyenv,scripts,tests,*.egg
show-source = true
max-line-length = 120
